<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>talkDiary - 대화만 하면 일기가 뚝딱!</title>
    <!-- Google Fonts: Outfit & Noto Sans KR -->
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@300;400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="star-container"></div>
    <!-- 🌌 고성능 듀얼 은하수 캔버스 엔진 -->
    <canvas id="stardust-pile-canvas"></canvas>
    <canvas id="stardust-flying-canvas"></canvas>
    <!-- Auth Overlay: Login/Signup Screen -->
    <div id="auth-overlay">
        <div class="auth-box">
            <div class="auth-header">
                <i class="fas fa-feather-alt auth-logo-icon"></i>
                <h1>talkDiary</h1>
                <p class="auth-subtitle">당신의 오늘을 기록하는 가장 다정한 방법</p>
            </div>

            <div id="user-selection-view">
                <div class="section-header">
                    <h3>선택</h3>
                    <p>기존 이야기를 불러오려면 카드를 선택하세요.</p>
                </div>
                <div id="user-cards" class="user-cards-grid">
                    <!-- User cards will be injected here -->
                </div>
                <button id="show-signup-btn" class="secondary-btn"><i class="fas fa-plus"></i> 새로운 이야기</button>
            </div>

            <div id="login-view" style="display: none;">
                <div class="section-header">
                    <h3 id="login-title">로그인</h3>
                    <p>비밀번호를 입력하여 대화를 계속하세요.</p>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="login-password" placeholder="비밀번호">
                </div>
                <div class="auth-buttons">
                    <button id="login-btn" class="primary-btn">대화 시작하기</button>
                    <button id="back-to-users" class="text-btn">뒤로 가기</button>
                </div>
            </div>

            <div id="signup-view" style="display: none;">
                <div class="section-header">
                    <h3>새로운 이야기 시작</h3>
                    <p>닉네임과 비밀번호를 설정하여 시작하세요.</p>
                </div>
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="signup-name" placeholder="닉네임">
                </div>
                <div class="input-group">
                    <i class="fas fa-key"></i>
                    <input type="password" id="signup-password" placeholder="비밀번호">
                </div>
                <div class="auth-buttons">
                    <button id="signup-btn" class="primary-btn">등록 및 시작</button>
                    <button id="cancel-signup-btn" class="text-btn">취소</button>
                </div>
            </div>
        </div>
    </div>

    <div class="app-container" style="display: none;">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="logo">
                <i class="fas fa-feather-alt"></i>
                <span>talkDiary</span>
                <span id="effect-toggle" class="active" title="별빛 효과 토글">✦</span>
            </div>
            <ul class="nav-links">
                <li class="active" data-view="chat-view"><i class="fas fa-comment-dots"></i> <span>기록하기</span></li>
                <li data-view="history-view"><i class="fas fa-history"></i> <span>지난 기록</span></li>
                <li data-view="summary-view"><i class="fas fa-chart-pie"></i> <span>주간 요약</span></li>
            </ul>
            <div class="user-profile">
                <div class="avatar" id="user-avatar-container">
                    <img src="assets/hamster_profile.png?v=999" alt="Profile" id="user-profile-img">
                </div>
                <div class="info">
                    <p class="name" id="user-display-name">사용자님</p>
                    <p class="status">Online</p>
                </div>
                <button id="logout-btn" class="logout-btn" title="로그아웃"
                    style="background:none; border:none; color:var(--text-secondary); cursor:pointer; margin-left:auto; font-size:1.1rem;"><i
                        class="fas fa-sign-out-alt"></i></button>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="content">
            <!-- Header -->
            <header>
                <h1 id="view-title">기록하기</h1>
                <div class="header-controls">
                    <input type="date" id="date-selector" class="date-input">
                </div>
            </header>

            <!-- Chat View (Main Interaction) -->
            <section id="chat-view" class="view-section active">
                <div class="chat-container">
                    <div class="chat-messages" id="chat-messages">
                        <!-- Messages will be injected here -->
                    </div>
                    <div class="chat-input-area">
                        <textarea id="user-input" placeholder="메시지를 입력하세요..." rows="1"></textarea>
                        <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </section>

            <!-- History View -->
            <section id="history-view" class="view-section">
                <div class="history-grid" id="history-list">
                    <!-- History cards will be injected here -->
                </div>
            </section>

            <!-- Summary View -->
            <section id="summary-view" class="view-section">
                <div class="summary-dashboard">
                    <div class="summary-cards">
                        <div class="summary-card">
                            <h3>이번 주 기분 통계</h3>
                            <div id="mood-stats">데이터를 불러오는 중...</div>
                        </div>
                        <div class="summary-card">
                            <h3>가장 많이 나온 키워드</h3>
                            <div id="keyword-stats">데이터를 불러오는 중...</div>
                        </div>
                    </div>
                    <div class="weekly-overview" id="weekly-overview">
                        <!-- Weekly summary detail -->
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal for Detail View -->
    <div id="diary-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modal-date" class="modal-date"></div>
            <h2 id="modal-title" class="modal-title"></h2>
            <div class="modal-body">
                <div class="modal-section">
                    <h3>📝 작성된 일기</h3>
                    <div id="modal-diary-content" class="modal-diary-content"></div>
                </div>
            </div>

        </div>
    </div>

    <!-- Firebase SDK (Modular) -->

    <script type="module">
        // Firebase & Google AI configuration will be handled in script.js
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDoc, getDocs, query, where, orderBy, limit, doc, setDoc, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        window.firebaseCore = { initializeApp };
        window.firebaseFirestore = { getFirestore, collection, addDoc, getDoc, getDocs, query, where, orderBy, limit, doc, setDoc, Timestamp };


        window.GoogleGenerativeAI = GoogleGenerativeAI;
    </script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Custom Logic -->
    <script src="script.js" type="module"></script>
</body>

</html>
